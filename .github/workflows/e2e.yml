name: E2E Tests

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging
      - main

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: preview

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      # Test credentials — sensitive (from GitHub Secrets)
      TEST_SUPER_ADMIN_EMAIL: ${{ secrets.TEST_SUPER_ADMIN_EMAIL }}
      TEST_SUPER_ADMIN_PASSWORD: ${{ secrets.TEST_SUPER_ADMIN_PASSWORD }}
      TEST_BIGCAFE_OWNER_EMAIL: ${{ secrets.TEST_BIGCAFE_OWNER_EMAIL }}
      TEST_BIGCAFE_OWNER_PASSWORD: ${{ secrets.TEST_BIGCAFE_OWNER_PASSWORD }}
      TEST_BIGCAFE_ADMIN_EMAIL: ${{ secrets.TEST_BIGCAFE_ADMIN_EMAIL }}
      TEST_BIGCAFE_ADMIN_PASSWORD: ${{ secrets.TEST_BIGCAFE_ADMIN_PASSWORD }}
      TEST_TENANT_1: ${{ secrets.TEST_TENANT_1 }}
      TEST_TENANT_2: ${{ secrets.TEST_TENANT_2 }}

      # Always run against staging — no local dev server
      BASE_URL: ${{ secrets.BASE_URL || 'https://staging.cafepulse.org' }}

      # Skip MFA in CI test environment
      SKIP_MFA_FOR_TESTING: "true"

      # CI flag
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://staging.cafepulse.org' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces/screenshots/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
