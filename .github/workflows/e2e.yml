name: E2E Tests

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging
      - main

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview

    strategy:
      fail-fast: true
      matrix:
        browser: [chromium]

    env:
      # Test credentials — sensitive (from GitHub Secrets)
      TEST_SUPER_ADMIN_EMAIL: ${{ secrets.TEST_SUPER_ADMIN_EMAIL }}
      TEST_SUPER_ADMIN_PASSWORD: ${{ secrets.TEST_SUPER_ADMIN_PASSWORD }}
      TEST_TENANT_OWNER_EMAIL: ${{ secrets.TEST_TENANT_OWNER_EMAIL }}
      TEST_TENANT_OWNER_PASSWORD: ${{ secrets.TEST_TENANT_OWNER_PASSWORD }}
      TEST_TENANT_ADMIN_EMAIL: ${{ secrets.TEST_TENANT_ADMIN_EMAIL }}
      TEST_TENANT_ADMIN_PASSWORD: ${{ secrets.TEST_TENANT_ADMIN_PASSWORD }}
      TEST_TENANT_1: ${{ secrets.TEST_TENANT_1 }}
      TEST_TENANT_2: ${{ secrets.TEST_TENANT_2 }}

      # Always run against staging — no local dev server
      BASE_URL: ${{ secrets.BASE_URL || 'https://staging.cafepulse.org' }}
      TEST_TENANT_BASE_URL: ${{ secrets.TEST_TENANT_BASE_URL || 'https://bigcafe.staging.cafepulse.org' }}

      # Skip MFA in CI test environment
      SKIP_MFA_FOR_TESTING: "true"

      # Vercel deployment protection bypass
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}

      # CI flag
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Wait for Vercel deployment
        run: |
          echo "Waiting for Vercel to finish deploying staging..."
          VERCEL_TOKEN="${{ secrets.VERCEL_TOKEN }}"
          PROJECT_ID="prj_R1T2NCrhiMMsFxceJgYIwVVnBuEX"
          COMMIT_SHA="${{ github.sha }}"
          MAX_WAIT=300
          INTERVAL=10
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            DEPLOYMENT=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=5" \
              -H "Authorization: Bearer $VERCEL_TOKEN")

            STATE=$(echo "$DEPLOYMENT" | python3 -c "
          import sys,json
          deployments=json.load(sys.stdin).get('deployments',[])
          commit_sha = '$COMMIT_SHA'
          for d in deployments:
              meta = d.get('meta',{})
              if meta.get('githubCommitSha','').startswith(commit_sha[:7]):
                  print(d['state'])
                  break
          else:
              print('not_found')
          ")

            echo "Deployment state: $STATE (elapsed: ${ELAPSED}s)"

            if [ "$STATE" = "READY" ]; then
              echo "Vercel deployment is ready! Waiting 15s for warmup..."
              sleep 15
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Vercel deployment failed with state: $STATE"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timed out waiting for Vercel deployment after ${MAX_WAIT}s"
          exit 1

      - name: Smoke test staging URL
        run: |
          echo "Checking BASE_URL and TEST_TENANT_BASE_URL are reachable..."
          curl -I "${{ secrets.BASE_URL || 'https://staging.cafepulse.org' }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            --max-time 10 || echo "BASE_URL check failed"
          curl -I "${{ secrets.TEST_TENANT_BASE_URL || 'https://bigcafe.staging.cafepulse.org' }}/admin/login" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            --max-time 10 || echo "TEST_TENANT_BASE_URL check failed"

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }} --max-failures=1
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://staging.cafepulse.org' }}
          TEST_TENANT_BASE_URL: ${{ secrets.TEST_TENANT_BASE_URL || 'https://bigcafe.staging.cafepulse.org' }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces/screenshots/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
