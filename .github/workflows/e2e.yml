name: E2E Tests

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging
      - main

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      # Supabase — public vars (from GitHub Variables)
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      # Supabase — sensitive (from GitHub Secrets)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      # Test credentials — sensitive (from GitHub Secrets)
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      TEST_OWNER_EMAIL: ${{ secrets.TEST_OWNER_EMAIL }}
      TEST_OWNER_PASSWORD: ${{ secrets.TEST_OWNER_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_STAFF_EMAIL: ${{ secrets.TEST_STAFF_EMAIL }}
      TEST_STAFF_PASSWORD: ${{ secrets.TEST_STAFF_PASSWORD }}

      # Point at staging — skip local dev server entirely
      BASE_URL: ${{ secrets.BASE_URL || 'https://staging.cafepulse.org' }}

      # App settings — public vars (from GitHub Variables)
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_SQUARE_ENVIRONMENT: ${{ vars.NEXT_PUBLIC_SQUARE_ENVIRONMENT || 'sandbox' }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ vars.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_LOCATION_ID: ${{ vars.NEXT_PUBLIC_SQUARE_LOCATION_ID }}

      # Skip MFA in CI test environment
      SKIP_MFA_FOR_TESTING: "true"

      # CI flag (used by playwright.config.ts for retries/workers)
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Determine test mode
        id: mode
        run: |
          if [ -n "${{ secrets.BASE_URL }}" ]; then
            echo "mode=remote" >> $GITHUB_OUTPUT
            echo "base_url=${{ secrets.BASE_URL }}" >> $GITHUB_OUTPUT
            echo "▶ Running against remote URL: ${{ secrets.BASE_URL }}"
          else
            echo "mode=local" >> $GITHUB_OUTPUT
            echo "base_url=http://localhost:3000" >> $GITHUB_OUTPUT
            echo "▶ No BASE_URL secret — will spin up local dev server"
          fi

      # Local dev server mode: build and start Next.js before tests
      # Playwright's webServer config handles this automatically when BASE_URL is not set.
      # We override playwright.config.ts at runtime via env var to enable webServer.
      - name: Run E2E tests (local dev server)
        if: steps.mode.outputs.mode == 'local'
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: ""
          PLAYWRIGHT_WEB_SERVER: "true"

      # Remote mode: tests point directly at BASE_URL (staging or preview)
      - name: Run E2E tests (remote URL)
        if: steps.mode.outputs.mode == 'remote'
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces/screenshots/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
