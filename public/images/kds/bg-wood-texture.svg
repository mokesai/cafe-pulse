<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Base wood color gradient -->
    <linearGradient id="woodBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b896"/>
      <stop offset="50%" style="stop-color:#c9a87c"/>
      <stop offset="100%" style="stop-color:#d4b896"/>
    </linearGradient>

    <!-- Wood grain pattern -->
    <pattern id="grain" width="100" height="8" patternUnits="userSpaceOnUse">
      <rect width="100" height="8" fill="transparent"/>
      <line x1="0" y1="2" x2="100" y2="2.5" stroke="#b89b6a" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="5" x2="100" y2="5.8" stroke="#a08050" stroke-width="0.3" opacity="0.2"/>
    </pattern>

    <!-- Noise texture for paper feel -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.1)"/>
    </radialGradient>
  </defs>

  <!-- Base wood color -->
  <rect width="400" height="400" fill="url(#woodBase)"/>

  <!-- Horizontal grain lines -->
  <g opacity="0.4">
    <line x1="0" y1="20" x2="400" y2="22" stroke="#a08050" stroke-width="1"/>
    <line x1="0" y1="45" x2="400" y2="44" stroke="#b89b6a" stroke-width="0.5"/>
    <line x1="0" y1="78" x2="400" y2="80" stroke="#a08050" stroke-width="0.8"/>
    <line x1="0" y1="112" x2="400" y2="110" stroke="#b89b6a" stroke-width="0.6"/>
    <line x1="0" y1="150" x2="400" y2="152" stroke="#a08050" stroke-width="1"/>
    <line x1="0" y1="188" x2="400" y2="186" stroke="#b89b6a" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="400" y2="227" stroke="#a08050" stroke-width="0.7"/>
    <line x1="0" y1="260" x2="400" y2="258" stroke="#b89b6a" stroke-width="0.6"/>
    <line x1="0" y1="298" x2="400" y2="300" stroke="#a08050" stroke-width="0.9"/>
    <line x1="0" y1="335" x2="400" y2="333" stroke="#b89b6a" stroke-width="0.5"/>
    <line x1="0" y1="370" x2="400" y2="372" stroke="#a08050" stroke-width="0.8"/>
  </g>

  <!-- Wood grain variation -->
  <rect width="400" height="400" fill="url(#grain)" opacity="0.5"/>

  <!-- Warm overlay -->
  <rect width="400" height="400" fill="#e8d5b8" opacity="0.15"/>

  <!-- Subtle vignette -->
  <rect width="400" height="400" fill="url(#vignette)"/>
</svg>
